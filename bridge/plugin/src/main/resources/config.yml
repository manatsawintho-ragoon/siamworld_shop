# ตั้งค่า SiamsiteBridge
# แก้เสร็จแล้วพิมพ์ /siamsite-bridge reload หรือรีสตาร์ทเซิร์ฟเวอร์

panel:
  # ที่อยู่เซิร์ฟเวอร์ panel ไม่ต้องแก้ ยกเว้นทีมงานบอกให้แก้
  url: wss://panel.siamsite.shop/bridge
  # โทเคนจาก panel.siamsite.shop -> Dashboard -> Bridge -> Issue Token
  # แสดงครั้งเดียว ถ้าหายให้กดสร้างใหม่
  token: "PASTE-YOUR-TOKEN-HERE"

authme:
  # auto: true = อ่านค่า MySQL จาก plugins/AuthMe/config.yml ให้อัตโนมัติ (แนะนำ)
  # auto: false = ใช้ค่าด้านล่างแทน
  auto: true
  host: 127.0.0.1
  port: 3306
  database: authme
  user: authme
  password: ""
  # ชื่อตาราง AuthMe แก้เฉพาะกรณีใช้ชื่อไม่ใช่ค่าเริ่มต้น
  table: authme

nlogin:
  # auto: true = อ่านค่า MySQL จาก plugins/nLogin/config.yml ให้อัตโนมัติ (แนะนำ)
  # ใช้เมื่อ bridge.backend เป็น nlogin เท่านั้น
  auto: true
  host: 127.0.0.1
  port: 3306
  database: nlogin
  user: nlogin
  password: ""
  table: nlogin
  # nLogin เปลี่ยนชื่อคอลัมน์ได้ ค่าด้านล่างคือค่ามาตรฐาน
  # แก้เฉพาะกรณีเปลี่ยนชื่อคอลัมน์เองและปิด auto
  columns:
    id: ai
    last_name: username
    password: password
    email: email
    creation_date: creation_date
    last_seen: last_seen

bridge:
  # เลือกระบบล็อกอินที่จะอ่าน: auto, authme หรือ nlogin
  # auto = เลือกปลั๊กอินที่เจอ ถ้ามีทั้งคู่จะใช้ AuthMe และเตือนใน log
  backend: auto
  # จำนวน connection MySQL สูงสุด ปกติ 4 พอสำหรับหลักร้อย req/วินาที
  connection_pool_size: 4
  # จำนวน thread ที่ประมวลผล WS และตรวจรหัสผ่าน
  worker_threads: 4
  # เวลา reconnect อัตโนมัติ (เพิ่มเป็นเท่าตัวแบบสุ่ม)
  reconnect_initial_ms: 1000
  reconnect_max_ms: 60000
  # จำกัดจำนวน request ที่ค้างต่อ connection ต้องตรงกับฝั่ง panel
  max_inflight: 256
