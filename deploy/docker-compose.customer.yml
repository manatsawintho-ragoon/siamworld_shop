# ============================================================
#  SiamWorld Shop — Per-Customer Production Stack
#  Usage: managed by new-customer.sh (Linux) / new-customer.ps1 (Windows)
#  Do NOT edit manually — use the deploy script
#
#  NOTE: MYSQL_ROOT_HOST "%" is intentional — AuthMe plugin on the
#  customer's Minecraft server connects to this MySQL from outside.
#  Port is exposed per-customer (MYSQL_EXPOSED_PORT) and protected
#  by UFW firewall rules on the VPS host.
# ============================================================

services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-siamworld}
      MYSQL_USER: ${MYSQL_USER:-siamworld}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "${MYSQL_EXPOSED_PORT}:3306"   # AuthMe plugin connects here from Minecraft server
    volumes:
      - mysql_data:/var/lib/mysql
      - ${SOURCE_ROOT}/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  backend:
    build:
      context: ${SOURCE_ROOT}/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ${CUSTOMER_ENV_FILE}
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT}:4000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ${SOURCE_ROOT}/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        BACKEND_INTERNAL_URL: http://backend:4000
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  mysql_data:
  redis_data:

networks:
  internal:
    driver: bridge
