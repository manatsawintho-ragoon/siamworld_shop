# ============================================================
#  Nginx Proxy Manager — Reverse Proxy + SSL for all customers
#  Start FIRST before deploying any customer
#
#  Usage:
#    cd deploy\nginx-proxy-manager
#    docker compose up -d
#
#  Admin panel: http://YOUR_VPS_IP:81
#  Default login: admin@example.com / changeme
# ============================================================

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP (redirected to HTTPS)
      - "443:443"  # HTTPS
      - "81:81"    # NPM Admin Panel
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Allows routing to host ports

volumes:
  npm_data:
  npm_letsencrypt:
